volumes:
  certs:


networks:
  internet:
    internal: false
  proxy_attestd:
    internal: true
  proxy_echo:
    internal: true

services:
  certs-init:
    image: busybox:1.36
    network_mode: none
    command:
      - sh
      - -c
      - |
        mkdir -p /certs
        if [ ! -e /certs/traefik-certs.yml ]; then
          printf 'tls:\n  certificates: []\n' > /certs/traefik-certs.yml
        fi
    volumes:
      - certs:/certs
    restart: "no"

  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    depends_on:
      certs-init:
        condition: service_completed_successfully
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/certs/traefik-certs.yml
      - --providers.file.watch=true

      # Redirect HTTP to HTTPS
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https

      # Other settings
      - --api=false
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs:ro
    networks:
      - internet
      - proxy_attestd
      - proxy_echo

  attestd:
    build: ./attestd
    container_name: attestd
    restart: unless-stopped
    
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_attestd
      - traefik.http.routers.attestd.rule=Host(`${SERVER_DOMAIN}`) && PathPrefix(`/attestd/`)
      - traefik.http.routers.attestd.priority=9999
      - traefik.http.routers.attestd.entrypoints=websecure
      - traefik.http.routers.attestd.tls=true
      - traefik.http.services.attestd.loadbalancer.server.port=80
      - traefik.http.middlewares.attestd-strip.stripprefix.prefixes=/attestd
      - traefik.http.routers.attestd.middlewares=attestd-strip

    environment:
      SERVER_DOMAIN: ${SERVER_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      ACME_ADMIN_TOKEN: ${ACME_ADMIN_TOKEN:-}
      CERTIFICATE_PEM_PATH: /certs/tls.crt
      CERTIFICATE_KEY_PATH: /certs/tls.key
      ACME_STATE_DIR: /certs/acme
      TRAEFIK_CERTS_DYNAMIC_PATH: /certs/traefik-certs.yml

    volumes:
      - certs:/certs
      - /dev/tdx-guest:/dev/tdx-guest
    
    networks:
      - proxy_attestd

  echo:
    build: ./echo
    container_name: echo
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_echo
      - traefik.http.routers.echo.rule=Host(`${SERVER_DOMAIN}`)
      - traefik.http.routers.echo.entrypoints=websecure
      - traefik.http.routers.echo.tls=true
      - traefik.http.services.echo.loadbalancer.server.port=80
    
    networks:
      - proxy_echo
